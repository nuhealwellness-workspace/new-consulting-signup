<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
  <title>NuHeal 佳凱樂 - 夥伴註冊系統</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" type="text/css" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
  <script>
    tailwind.config = {
      theme: { 
        extend: { 
          colors: { 
            brand: { 
              dark: '#436142',    /* 圖中背景森林綠 */
              gold: '#DED4C1',    /* 圖中 Logo 香檳金/燕麥色 */
              accent: '#C4B1A0',  /* 輔助米色 */
              soft: '#F4F1EC'     /* 淺米白底色 */
            } 
          } 
        } 
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Noto+Sans+TC:wght@400;500;700&display=swap');
    
    body { background-color: #F3F4F6; font-family: 'Noto Sans TC', sans-serif; color: #4A4A4A; }
    .serif-title { font-family: 'Noto Serif TC', serif; }
    
    .mobile-container { max-width: 500px; margin: 0 auto; background: white; min-height: 100vh; box-shadow: 0 10px 25px rgba(0,0,0,0.05); display: flex; flex-direction: column; }
    
    /* 輸入框優化 */
    .form-input { width: 100%; padding: 0.8rem 1rem; border: 1.5px solid #DED4C1; border-radius: 0.75rem; outline: none; transition: all 0.2s; font-size: 15px; background-color: #FAFAF8; -webkit-appearance: none; }
    .form-input:focus { border-color: #436142; background-color: #fff; box-shadow: 0 0 0 3px rgba(67, 97, 66, 0.1); }
    .form-label { display: block; margin-bottom: 0.4rem; font-weight: 600; color: #6B7280; font-size: 0.9rem; }
    
    /* 按鈕樣式：使用圖中深綠與金色的對比 */
    .btn-primary { width: 100%; padding: 0.9rem; border-radius: 0.75rem; font-weight: bold; text-align: center; transition: all 0.2s; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 0.5rem; font-size: 1.05rem; letter-spacing: 1px;}
    .btn-primary:disabled { opacity: 0.7; cursor: not-allowed; }
    .btn-brand { background-color: #436142; color: #DED4C1; border: 1px solid #436142; }
    .btn-brand:not(:disabled):hover { background-color: #354d34; }
    
    .hidden-sec { display: none !important; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .animate-slide-up { animation: slideUp 0.5s ease forwards; }
  </style>
</head>
<body>

  <div class="mobile-container">
    
    <div class="bg-brand-dark pt-10 pb-8 px-6 text-center sticky top-0 z-20 shadow-lg">
      <div class="flex flex-col items-center gap-2">
        <div class="w-16 h-16 mb-2 flex items-center justify-center border-2 border-brand-gold rounded-full">
            <i class="ph ph-hand-heart text-brand-gold text-4xl"></i>
        </div>
        <h1 class="text-3xl font-bold text-brand-gold tracking-widest serif-title">NuHeal</h1>
        <div class="h-[1px] w-24 bg-brand-gold opacity-30 my-1"></div>
        <p class="text-xs text-brand-gold font-medium tracking-[0.2em] opacity-90">WELLNESS & HEALTHCARE</p>
      </div>
    </div>

    <div id="registerSection" class="flex flex-col p-6 sm:p-8 flex-1">
      <div class="mb-8 text-center">
        <h2 class="text-xl font-bold text-brand-dark mb-2">夥伴系統註冊</h2>
        <p class="text-gray-400 text-xs">歡迎加入佳凱樂！請填寫以下資料完成註冊流程。</p>
      </div>

      <form id="regForm" onsubmit="handleRegister(event)" class="flex flex-col gap-5 pb-10">
        
        <div>
          <label class="form-label">職位名稱 *</label>
          <select name="role" required class="form-input bg-white">
            <option value="" disabled selected>請選擇職位</option>
            <option value="營養師">營養師</option>
            <option value="管理員">管理員</option>
            <option value="系統維護人員">系統維護人員</option>
          </select>
        </div>

        <div><label class="form-label">姓名 *</label><input type="text" name="name" required class="form-input" placeholder="請填寫真實姓名"></div>
        <div><label class="form-label">聯繫電話 *</label><input type="tel" name="phone" required class="form-input" placeholder="如：0912-345678"></div>
        <div><label class="form-label">聯繫地址</label><input type="text" name="address" class="form-input" placeholder="請填寫通訊地址"></div>
        <div><label class="form-label">出生年月日</label><input type="date" name="dob" class="form-input bg-white"></div>
        <div><label class="form-label">Line ID</label><input type="text" name="line" class="form-input" placeholder="選填"></div>

        <div>
          <label class="form-label text-brand-dark"><i class="ph ph-chat-teardrop-text align-middle"></i> 有什麼想說的？</label>
          <textarea name="message" class="form-input" placeholder="對佳凱樂的期許..."></textarea>
        </div>

        <hr class="border-brand-gold border-dashed my-4 opacity-50">

        <div class="bg-brand-dark bg-opacity-[0.03] p-5 rounded-xl border border-brand-dark border-opacity-10">
          <h3 class="font-bold text-brand-dark mb-4 flex items-center gap-1"><i class="ph ph-lock-key"></i> 登入帳號設定</h3>
          
          <div class="flex flex-col gap-4">
            <div>
              <label class="form-label text-sm">登入 Email *</label>
              <input type="email" name="email" id="email" required class="form-input bg-white" placeholder="此為未來登入系統之帳號">
            </div>
            <div>
              <label class="form-label text-sm">註冊密碼 *</label>
              <input type="password" name="password" id="password" required class="form-input bg-white" placeholder="請輸入密碼">
            </div>
            <div>
              <label class="form-label text-sm">再次確認密碼 *</label>
              <input type="password" id="confirmPassword" required class="form-input bg-white" placeholder="請再次輸入密碼">
              <p id="pwdError" class="text-xs text-red-500 font-bold mt-1 hidden"><i class="ph ph-warning-circle align-middle"></i> 密碼輸入不一致</p>
            </div>
          </div>
        </div>

        <div class="pt-6">
          <button type="submit" id="submitBtn" class="btn-primary btn-brand shadow-lg py-4">
            <i class="ph ph-user-plus text-xl"></i> 建立帳號並註冊
          </button>
          <div id="sysMsg" class="text-center mt-4 hidden text-sm font-bold p-3 rounded-lg"></div>
        </div>
      </form>
    </div>

    <div id="successSection" class="hidden-sec flex flex-col p-8 flex-1 justify-center items-center bg-gray-50">
      <div class="w-full bg-white p-8 rounded-2xl shadow-xl border border-brand-gold border-opacity-30 flex flex-col items-center gap-6 animate-slide-up">
        
        <div class="w-20 h-20 bg-green-50 rounded-full flex items-center justify-center text-brand-dark mb-2">
          <i class="ph ph-check-circle text-6xl"></i>
        </div>
        
        <div class="text-center">
          <h2 class="text-2xl font-bold text-gray-800 mb-2 serif-title">註冊大成功！</h2>
          <p class="text-sm text-gray-500 leading-relaxed">
            恭喜您成為 NuHeal 的夥伴！<br>
            系統已發送備份信件，請檢查您的信箱。
          </p>
        </div>

        <div class="w-full border-t border-gray-100 my-2"></div>

        <a href="https://nuhealwellness-workspace.github.io/consulting-system/" 
           class="btn-primary btn-brand py-4 text-lg shadow-md w-full">
          <i class="ph ph-rocket-launch text-xl"></i> 進入工作站登入
        </a>
      </div>
    </div>
  </div>

  <script>
    // 配置：請務必更換為您的 GAS 部署網址
    const GAS_API_URL = 'https://script.google.com/macros/s/AKfycbwJSBhfEno4UcwKW0ZVoWqLlEVjSYyXwjyegxtSwQ7XzMEJ5JRRJApWPbYv21miO5KH/exec';
    const STORAGE_KEY = 'nuheal_reg_form_data';

    document.addEventListener('DOMContentLoaded', () => {
      const form = document.getElementById('regForm');
      const savedData = localStorage.getItem(STORAGE_KEY);
      if (savedData) {
        try {
          const parsedData = JSON.parse(savedData);
          Object.keys(parsedData).forEach(key => {
            const field = form.elements[key];
            if (field && field.type !== 'password') {
              field.value = parsedData[key];
            }
          });
        } catch (e) { console.error('Data Restore Error', e); }
      }

      form.addEventListener('input', (e) => {
        const target = e.target;
        if (target.type === 'password' || !target.name) return;
        const currentData = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
        currentData[target.name] = target.value;
        localStorage.setItem(STORAGE_KEY, JSON.stringify(currentData));
      });
    });

    async function handleRegister(e) {
      e.preventDefault();
      
      const pwd = document.getElementById('password').value;
      const confirmPwd = document.getElementById('confirmPassword').value;
      const btn = document.getElementById('submitBtn');
      const sysMsg = document.getElementById('sysMsg');
      const errorMsg = document.getElementById('pwdError');

      if (pwd !== confirmPwd) {
        errorMsg.classList.remove('hidden');
        document.getElementById('confirmPassword').focus();
        return;
      } else {
        errorMsg.classList.add('hidden');
      }

      btn.disabled = true;
      btn.innerHTML = '<i class="ph ph-spinner ph-spin text-xl"></i> 系統寫入中...';
      sysMsg.classList.add('hidden');

      const formData = Object.fromEntries(new FormData(e.target).entries());

      try {
        const response = await fetch(GAS_API_URL, {
          method: 'POST',
          body: JSON.stringify(formData)
        });
        const res = await response.json();

        if (res.status === 'success') {
          localStorage.removeItem(STORAGE_KEY);
          document.getElementById('registerSection').classList.add('hidden-sec');
          document.getElementById('successSection').classList.remove('hidden-sec');
          window.scrollTo({ top: 0, behavior: 'smooth' });
        } else {
          throw new Error(res.message);
        }
      } catch (err) {
        sysMsg.classList.remove('hidden');
        sysMsg.className = 'text-center mt-4 text-sm font-bold p-3 rounded-lg bg-red-50 text-red-600 border border-red-200';
        sysMsg.innerHTML = `<i class="ph ph-warning-circle align-middle"></i> ${err.message}`;
        btn.disabled = false;
        btn.innerHTML = '<i class="ph ph-user-plus text-xl"></i> 建立帳號並註冊';
      }
    }
  </script>
</body>
</html>
